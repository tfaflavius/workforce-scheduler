name: Keep Alive - Render Backend

# Pings the Render backend every 10 minutes to prevent it from sleeping.
# Render Free Tier stops the server after 15 min of inactivity.
# This ensures cron jobs (email reports at 08:00, 20:00, 20:30) always fire.

on:
  schedule:
    # Every 10 minutes, 24/7
    - cron: '*/10 * * * *'
  workflow_dispatch: # Allow manual trigger

jobs:
  keep-alive:
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Ping Render health endpoint
        run: |
          echo "Pinging Render backend at $(date -u '+%Y-%m-%d %H:%M:%S UTC')..."

          HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            --max-time 30 \
            --retry 2 \
            --retry-delay 5 \
            "https://workforce-scheduler-mzgd.onrender.com/api/health")

          echo "Response status: $HTTP_STATUS"

          if [ "$HTTP_STATUS" -ge 200 ] && [ "$HTTP_STATUS" -lt 300 ]; then
            echo "✅ Server is alive (HTTP $HTTP_STATUS)"
          elif [ "$HTTP_STATUS" -eq 000 ]; then
            echo "⚠️ Server did not respond (timeout/connection error). It may be waking up."
            echo "This is normal if the server was sleeping. Next ping should succeed."
          else
            echo "⚠️ Unexpected response (HTTP $HTTP_STATUS)"
          fi
